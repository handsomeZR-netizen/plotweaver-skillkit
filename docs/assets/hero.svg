  <rect x="1206" y="410" width="310" height="188" rx="24" fill="url(#card)" stroke="#D5E1E8" stroke-opacity="0.24"/>
  <text x="114" y="472" fill="#F7FBFD" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">Signal Harvester</text>
  <text x="114" y="516" fill="#D8E6EC" font-family="Segoe UI, Arial, sans-serif" font-size="22">HTML, text, images, code snippets,</text>
  <text x="114" y="548" fill="#D8E6EC" font-family="Segoe UI, Arial, sans-serif" font-size="22">and OCR fallback collection.</text>
  <text x="488" y="472" fill="#F7FBFD" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">Style Loom</text>
  <text x="488" y="516" fill="#D8E6EC" font-family="Segoe UI, Arial, sans-serif" font-size="22">Profiles, index, template registry,</text>
  <text x="488" y="548" fill="#D8E6EC" font-family="Segoe UI, Arial, sans-serif" font-size="22">and reuse playbook generation.</text>
  <text x="862" y="472" fill="#F7FBFD" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">Proof Capture</text>
  <text x="862" y="516" fill="#D8E6EC" font-family="Segoe UI, Arial, sans-serif" font-size="22">Browser validation and missing</text>
  <text x="862" y="548" fill="#D8E6EC" font-family="Segoe UI, Arial, sans-serif" font-size="22">report surfacing for risky runs.</text>
  <text x="1236" y="472" fill="#F7FBFD" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">Project-B Handoff</text>
  <text x="1236" y="516" fill="#D8E6EC" font-family="Segoe UI, Arial, sans-serif" font-size="22">Starter scripts and clear rules</text>
  <text x="1236" y="548" fill="#D8E6EC" font-family="Segoe UI, Arial, sans-serif" font-size="22">for downstream Codex reuse.</text>
