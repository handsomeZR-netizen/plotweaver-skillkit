  <text x="124" y="158" fill="#D8E6EC" font-family="Segoe UI, Arial, sans-serif" font-size="28" letter-spacing="4">CODEX-READY PLOT EXTRACTION AND REUSE SYSTEM</text>
  <text x="124" y="246" fill="#F7FBFD" font-family="Georgia, Times New Roman, serif" font-size="84" font-weight="700">PlotWeaver SkillKit</text>
  <text x="124" y="312" fill="#D8E6EC" font-family="Segoe UI, Arial, sans-serif" font-size="34">Turn WeChat article plots into reusable paper-figure style assets.</text>
  <rect x="1226" y="92" width="292" height="220" rx="26" fill="url(#card)" stroke="#D5E1E8" stroke-opacity="0.28"/>
  <text x="1262" y="150" fill="#F7FBFD" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Workflow</text>
  <text x="1262" y="194" fill="#D8E6EC" font-family="Segoe UI, Arial, sans-serif" font-size="22">1. Harvest signals</text>
  <text x="1262" y="230" fill="#D8E6EC" font-family="Segoe UI, Arial, sans-serif" font-size="22">2. Weave style index</text>
  <text x="1262" y="266" fill="#D8E6EC" font-family="Segoe UI, Arial, sans-serif" font-size="22">3. Validate capture</text>
  <text x="1262" y="302" fill="#D8E6EC" font-family="Segoe UI, Arial, sans-serif" font-size="22">4. Handoff to project B</text>
